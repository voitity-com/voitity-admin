version: "3.9"

services:
  voitity-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voitity-admin-app
    working_dir: /app/src
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - /app/src/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
